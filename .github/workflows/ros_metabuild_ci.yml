name: RailOS Metadata Build

on:
  push:
    branches:
      - main

jobs:
  collect-metadata:
    name: Create or Update Project Metadata File
    runs-on: ubuntu-latest
    container:
      image: artemisbeta/railwayopsim-ci:latest
      env:
        DEBIAN_FRONTEND : noninteractive
        LANG : 'en_GB.UTF-8'
        LANGUAGE : 'en_GB:en'
        LC_ALL : 'en_GB.UTF-8'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Mark repository as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Get latest author
        shell: bash
        run: echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
        id: extract_author

      - name: Create/Update File
        run: metabuild "$GITHUB_WORKSPACE" --repo-name "$GITHUB_REPOSITORY" --debug

      - name: Commit to git
        run: |
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add $GITHUB_WORKSPACE/Metadata/*.toml
            git commit -m "$GITHUB_RUN_ID:$RUNNER_NAME: Modified metadata for commit \"$GITHUB_SHA\""
        continue-on-error: true

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            branch: ${{ github.ref }}
